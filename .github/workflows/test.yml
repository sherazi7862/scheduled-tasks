name: Test Setup
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Check secrets are configured
        env:
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
          ACCOUNT_SID: ${{ secrets.ACCOUNT_SID }}
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
        run: |
          if [ -z "$OWM_API_KEY" ]; then
            echo "OWM_API_KEY secret is not set!"
            exit 1
          else
            echo "OWM_API_KEY is configured"
          fi
          if [ -z "$ACCOUNT_SID" ]; then
            echo "ACCOUNT_SID secret is not set!"
            exit 1
          else
            echo "ACCOUNT_SID is configured"
          fi
          if [ -z "$AUTH_TOKEN" ]; then
            echo "AUTH_TOKEN secret is not set!"
            exit 1
          else
            echo "AUTH_TOKEN is configured"
          fi
          echo "All secrets are configured!"
      - name: Check required files exist
        run: |
          if [ -f "main.py" ]; then echo "main.py found"; else echo "main.py not found!"; exit 1; fi
          if [ -f "requirements.txt" ]; then echo "requirements.txt found"; else echo "requirements.txt not found!"; exit 1; fi
      - name: Test Python syntax
        run: python -m py_compile main.py && echo "Python syntax OK"
      - name: Success
        run: echo "All checks passed! Your setup is ready to go."
